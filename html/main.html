<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noteify</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

  <!-- CSS -->
<link rel="stylesheet" href="../css/main.css">
</head>

<body>

  <!-- Top Menu Bar -->
  <div class="menu-bar">
    <div class="menu-item"><button>Home</button></div>
    <div class="menu-item"><button>Edit
      <div class="drop-down">
        
      </div>
    </button></div>
    <div class="menu-item"><button>View</button></div>
    <div class="menu-item"><button>Note</button></div>
    <div class="menu-item"><button>Tools</button></div>
    <div class="menu-item"><button>Help</button></div>
  </div>

  <div class="container">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <button class="notify-btn">Notify</button>

      <div class="search-box">
        <span class="material-symbols-outlined">search</span>
        <input id="searchInput" type="text" placeholder="Search notes...">
      </div>

      <button id="addNoteBtn" class="gray-btn full">+ Add Note</button>

      <div class="sidebar-links">
        <div class="link-item"><span class="material-symbols-outlined">folder</span> Files</div>
        <div class="link-item"><span class="material-symbols-outlined">calendar_month</span> Calendar</div>
        <div class="link-item"><span class="material-symbols-outlined">description</span> Templates</div>
        <div class="link-item"><span class="material-symbols-outlined">note</span> Notebooks</div>
        <div class="link-item"><span class="material-symbols-outlined">label</span> Tags</div>
      </div>

      <button class="upgrade-btn">
        <span class="material-symbols-outlined">stat_3</span> Upgrade
      </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <h2>Your Home</h2>
      <h3>Notes</h3>

      <section id="notesContainer" class="notes-grid">
        <!-- Notes injected from JavaScript -->
      </section>

      <h3>Scratch Pad</h3>
      <div class="scratch-box">
        <textarea id="scratchPad" placeholder="Write here..."></textarea>
      </div>

    </main>
  </div>

  <!-- Popup Modal for Adding / Editing Notes -->
  <div id="noteModal" class="modal hidden">
    <div class="modal-content">
      <h3 id="modalTitle">New Note</h3>
      <input id="noteTitle" type="text" placeholder="Title" />
      <textarea id="noteBody" placeholder="Write your note..."></textarea>

      <div class="modal-actions">
        <button id="saveNoteBtn" class="save-btn">Save</button>
        <button id="closeModalBtn" class="close-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- JS -->
   <script src="../js/main.js"></script>

</body>
</html>
