<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noteify</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/main.css" />
    <script type="module" src="../js/firebase-config.js"></script>
  </head>

  <body>
    <!-- Top Menu Bar -->
    <div class="menu-bar">
      <div class="menu-item" style="margin-left: auto">
        <button onclick="logout()" class="logout-btn">Logout</button>
      </div>
    </div>

    <div class="container">
      <!-- Sidebar -->
      <aside class="sidebar">
        <a href="index.html"><button class="notify-btn">Notify</button></a>

        <div class="search-box">
          <span class="material-symbols-outlined">search</span>
          <input id="searchInput" type="text" placeholder="Search notes..." />
        </div>

        <button id="addNoteBtn" class="gray-btn full">+ Add Note</button>

        <div class="sidebar-links">
          <div class="link-item">
            <span class="material-symbols-outlined">folder</span>
            <a href="file.html">Files</a>
          </div>
          <div
            class="link-item"
            onclick="showTemplates()"
            style="cursor: pointer"
          >
            <span class="material-symbols-outlined">description</span> Templates
          </div>
          <div
            class="link-item"
            onclick="showTagsModal()"
            style="cursor: pointer"
          >
            <span class="material-symbols-outlined">label</span> Tags
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <h3>Notes</h3>

        <!-- Notes Toolbar -->
        <div
          class="notes-toolbar"
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            flex-wrap: wrap;
            gap: 10px;
          "
        >
          <div
            class="toolbar-left"
            style="display: flex; align-items: center; gap: 10px"
          >
            <select
              id="sortSelect"
              style="
                background: var(--bg-panel-light);
                color: white;
                border: none;
                padding: 6px 10px;
                border-radius: 6px;
                font-size: 12px;
              "
            >
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
              <option value="title">By Title</option>
              <option value="updated">Recently Updated</option>
              <option value="tags">By Tags</option>
            </select>

            <div
              id="filterStatus"
              style="
                background: var(--primary);
                color: white;
                padding: 4px 8px;
                border-radius: 12px;
                font-size: 11px;
                display: none;
              "
            >
              <!-- Filter status will be shown here -->
            </div>
          </div>

          <div
            class="toolbar-right"
            style="display: flex; align-items: center; gap: 10px"
          >
            <button
              onclick="exportNotes()"
              style="
                background: var(--accent);
                color: black;
                border: none;
                padding: 6px 12px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 12px;
                font-weight: 500;
              "
            >
              Export
            </button>
          </div>
        </div>

        <section id="notesContainer" class="notes-grid">
          <!-- Notes injected from JavaScript -->
        </section>

        <h3>Scratch Pad</h3>
        <div class="scratch-box">
          <textarea id="scratchPad" placeholder="Write here..."></textarea>
        </div>
      </main>
    </div>

    <!-- Popup Modal for Adding / Editing Notes -->
    <div id="noteModal" class="modal hidden">
      <div class="modal-content">
        <h3 id="modalTitle">New Note</h3>
        <input id="noteTitle" type="text" placeholder="Title" />
        <textarea id="noteBody" placeholder="Write your note..."></textarea>

        <div class="modal-actions">
          <button id="saveNoteBtn" class="save-btn">Save</button>
          <button id="closeModalBtn" class="close-btn">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Templates Modal -->
    <div id="templatesModal" class="modal hidden">
      <div class="modal-content">
        <h3>Note Templates</h3>
        <div
          id="templatesContainer"
          style="max-height: 400px; overflow-y: auto"
        >
          <!-- Templates will be injected here -->
        </div>
        <div class="modal-actions">
          <button id="closeTemplatesBtn" class="close-btn">Close</button>
        </div>
      </div>
    </div>

    <!-- Tags Modal -->
    <div id="tagsModal" class="modal hidden">
      <div class="modal-content">
        <h3>Filter by Tags</h3>
        <div id="tagsContainer" style="max-height: 400px; overflow-y: auto">
          <!-- Tags will be injected here -->
        </div>
        <div class="modal-actions">
          <button id="closeTagsBtn" class="close-btn">Close</button>
        </div>
      </div>
    </div>

    <!-- JS Modules -->
    <script src="../js/auth-utils.js"></script>
    <script src="../js/modules/config.js"></script>
    <script src="../js/modules/storage.js"></script>
    <script src="../js/modules/ui.js"></script>
    <script src="../js/modules/notes.js"></script>
    <script src="../js/modules/templates.js"></script>
    <script src="../js/modules/tags.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
