<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noteify - Sign In</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">Noteify</a>
        <div class="nav-links">
            <a href="index.html">index</a>
            <a href="signup.html" class="active">Sign Up</a>
    </div>
    </nav>
    <main class="login-page">
        <section class="login-container">
            <header class="login-header">
                <h1>Welcome Back!</h1>
                <p>Sign in to access your Noteify account</p>
            </header>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email or Phone</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email or phone" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn">Continue</button>
            </form>

            <div class="login-options">
                <a href="forget.html" class="forgot-password">Forgot password?</a>
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
            </div>
        </section>

        <footer class="login-footer">
            <div class="footer-content">
                <span>© 2025 Noteify. All rights reserved.</span>
            </div>
            <div class="footer-links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Help</a>
            </div>
        </footer>
    </main>

    <script src="../js/login.js"></script>
</body>
</html>
