<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noteify - Reset Password</title>
    <link rel="stylesheet" href="../css/forget.css">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="logo">Noteify</a>
        <div class="nav-links">
            <a href="login.html">Login</a>
            <a href="signup.html">Sign Up</a>
        </div>
    </nav>

    <main class="forgot-page">
        <section class="forgot-container">
            <header class="forgot-header">
                <h1>Reset Password</h1>
                <p>Enter your reset token and a new password</p>
            </header>

            <form id="resetForm" class="forgot-form">
                <div class="form-group">
                    <label for="token">Reset Token</label>
                    <input type="text" id="token" placeholder="Paste your reset token" required>
                </div>
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" placeholder="At least 6 characters" required>
                </div>
                <div class="form-group">
                    <label for="confirm">Confirm Password</label>
                    <input type="password" id="confirm" placeholder="Repeat new password" required>
                </div>
                <button type="submit" class="btn">Reset Password</button>
            </form>

            <div class="forgot-options">
                <p>Remembered it? <a href="login.html">Login</a></p>
            </div>
        </section>
    </main>

    <script src="../js/modules/api.js"></script>
    <script src="../js/auth-utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Pre-fill token if coming from forgot page
            const saved = localStorage.getItem('reset_token');
            if (saved) document.getElementById('token').value = saved;

            document.getElementById('resetForm').addEventListener('submit', async e => {
                e.preventDefault();
                const token = document.getElementById('token').value.trim();
                const password = document.getElementById('password').value.trim();
                const confirm = document.getElementById('confirm').value.trim();

                if (password !== confirm) { showNotification('Passwords do not match', 'error'); return; }
                if (password.length < 6) { showNotification('Password too short', 'error'); return; }

                const btn = e.target.querySelector('button[type="submit"]');
                btn.textContent = 'Resetting...'; btn.disabled = true;

                try {
                    await NoteifyAPI.resetPassword(token, password);
                    localStorage.removeItem('reset_token');
                    showNotification('Password reset! Please login.', 'success');
                    setTimeout(() => window.location.href = 'login.html', 1200);
                } catch (err) {
                    showNotification(err.message || 'Reset failed', 'error');
                } finally {
                    btn.textContent = 'Reset Password'; btn.disabled = false;
                }
            });
        });
    </script>
</body>

</html>
