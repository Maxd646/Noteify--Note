<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noteify - Sign Up</title>
    <link rel="stylesheet" href="../css/signup.css">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="logo">Noteify</a>
        <div class="nav-toggle" id="navToggle"><span></span><span></span><span></span></div>
        <div class="nav-links" id="navLinks">
            <a href="login.html">Login</a>
            <a href="signup.html" class="active">Sign Up</a>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                <span class="theme-icon">🌙</span>
            </button>
        </div>
    </nav>

    <main class="signup-page">
        <section class="signup-container">
            <header class="signup-header">
                <h1>Create Account</h1>
                <p>Sign up to start taking notes with Noteify</p>
            </header>

            <form id="signupForm" class="signup-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="At least 6 characters" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Repeat your password" required>
                </div>
                <button type="submit" class="btn">Create Account</button>
            </form>

            <div class="signup-options">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>
        </section>
    </main>

    <footer class="signup-footer">
        <div class="footer-content"><span>© 2026 Noteify. All rights reserved.</span></div>
        <div class="footer-links">
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Help</a>
        </div>
    </footer>

    <script src="../js/modules/api.js"></script>
    <script src="../js/auth-utils.js"></script>
    <script src="../js/signup.js"></script>
</body>

</html>
