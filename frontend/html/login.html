<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noteify - Sign In</title>
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="logo">Noteify</a>
        <div class="nav-toggle" id="navToggle"><span></span><span></span><span></span></div>
        <div class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="signup.html">Sign Up</a>
            <button class="theme-toggle" id="themeToggle"><span class="theme-icon">🌙</span></button>
        </div>
    </nav>

    <main class="login-page">
        <section class="login-container">
            <header class="login-header">
                <h1>Welcome Back!</h1>
                <p>Sign in to access your Noteify account</p>
            </header>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn">Sign In</button>
            </form>

            <div class="login-options">
                <a href="forget.html">Forgot password?</a>
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
            </div>
        </section>
    </main>

    <script src="../js/modules/api.js"></script>
    <script src="../js/auth-utils.js"></script>
    <script src="../js/login.js"></script>
</body>

</html>
